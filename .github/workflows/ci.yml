name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The core runner is stdlib-only: no install step is required to test it.
      - name: Validate all cases
        run: python -m evalbench validate

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Smoke (mock chat + command agent, no API keys)
        run: python -m evalbench smoke

  package:
    name: build sdist/wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check entry points import
        run: |
          python -m pip install dist/*.whl
          evb --help >/dev/null
          evalbench --help >/dev/null
