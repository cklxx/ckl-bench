name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The core runner is stdlib-only: no install step is required to test it.
      - name: Validate all cases
        run: python -m ckl_bench validate

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Smoke (mock chat + command agent, no API keys)
        run: python -m ckl_bench smoke

  package:
    name: build sdist/wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check entry points import
        run: |
          python -m pip install dist/*.whl
          ckl --help >/dev/null
          ckl-bench --help >/dev/null

  web:
    name: web (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test:run
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
